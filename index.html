<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE Core Business Solutions | Audit & Deployment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .logo-scroll { display: flex; overflow: hidden; gap: 4rem; }
        .logo-container { animation: scroll 30s linear infinite; display: flex; gap: 4rem; align-items: center; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="images/designer.png" alt="SE CORE Logo" class="h-12">
            <div>
                <span class="block font-black text-blue-900 leading-none">CORE</span>
                <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Business Solutions</span>
            </div>
        </div>
        <div class="hidden md:flex gap-8 font-semibold text-slate-600">
            <a href="#" class="hover:text-blue-900">Home</a>
            <a href="#services" class="hover:text-blue-900">Services</a>
            <a href="#enquiry" class="hover:text-blue-900">Enquiry</a>
        </div>
        <a href="#enquiry" class="bg-orange-500 text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-orange-200 hover:bg-orange-600 transition">Get Quote</a>
    </nav>

    <section class="relative py-20 px-6 md:px-12 bg-blue-900 overflow-hidden">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center relative z-10">
            <div class="text-white">
                <h1 class="text-4xl md:text-6xl font-black mb-6 leading-tight">
                    Audit & Deployment <br> Services South India
                </h1>
                <p class="text-lg text-slate-300 mb-8 max-w-lg">Providing high-quality visual merchandising, POSM deployment, and comprehensive stock audits.</p>
                <div class="flex flex-wrap gap-4">
                    <div class="bg-white/10 px-4 py-2 rounded-lg border border-white/20 flex items-center gap-2">
                        <i class="fas fa-check-circle text-orange-400"></i> Pan India Network
                    </div>
                </div>
            </div>
            
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1600880212340-02d956371844?auto=format&fit=crop&w=800" class="rounded-3xl shadow-2xl border-4 border-white/10" alt="SE Core Team">
            </div>
        </div>
    </section>

    <div class="bg-white py-12 border-b">
        <div class="max-w-7xl mx-auto px-6 overflow-hidden">
            <p class="text-center text-slate-400 font-bold uppercase tracking-widest text-xs mb-8">Trusted By Leading Brands</p>
            <div class="logo-scroll">
                <div class="logo-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Lenovo_logo_2015.svg" alt="Lenovo" class="h-8 grayscale opacity-60">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="h-8 grayscale opacity-60">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d4/Dell_Logo.svg" alt="Dell" class="h-8 grayscale opacity-60">
                    <img src="https://share.google/Y4D5vHkhrGsebhVbh" alt="HDFC" class="h-6 grayscale opacity-60">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Lenovo_logo_2015.svg" alt="Lenovo" class="h-8 grayscale opacity-60">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="h-8 grayscale opacity-60">
                </div>
            </div>
        </div>
    </div>

    <section id="enquiry" class="py-24 px-6 md:px-12 max-w-7xl mx-auto">
        <div class="grid md:grid-cols-2 gap-16">
            <div>
                <h2 class="text-4xl font-black text-blue-900 mt-2 mb-6">Enquiry</h2>
                <div class="space-y-6">
                    <div class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-slate-100">
                        <i class="fas fa-phone-alt text-blue-900 mr-4 text-xl"></i>
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase">Phone</p>
                            <p class="font-bold text-slate-800">+91 XXXXX XXXXX</p>
                        </div>
                    </div>
                    <div class="flex items-center p-4 bg-white rounded-xl shadow-sm border border-slate-100">
                        <i class="fas fa-envelope text-blue-900 mr-4 text-xl"></i>
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase">Email</p>
                            <p class="font-bold text-slate-800">info@secore.in</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl border border-slate-100">
                <form id="submit-to-google-sheet" class="space-y-4">
                    <input name="name" type="text" placeholder="Your Name" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-900">
                    <input name="company" type="text" placeholder="Company Name" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-900">
                    <input name="phone" type="tel" placeholder="Phone Number" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-900">
                    <select name="service" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none text-slate-500">
                        <option value="">Select Service Required</option>
                        <option value="Audit">External Audit</option>
                        <option value="Deployment">POSM Deployment</option>
                        <option value="Merchandising">Visual Merchandising</option>
                        <option value="Stock">Stock Audit</option>
                    </select>
                    <textarea name="message" rows="4" placeholder="How can we help?" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-900"></textarea>
                    
                    <button type="submit" id="submitBtn" class="w-full py-4 bg-blue-900 text-white font-black rounded-xl hover:bg-blue-800 transition uppercase tracking-widest">
                        Send Enquiry
                    </button>
                    <p id="msg" class="text-center text-sm font-bold mt-4"></p>
                </form>
            </div>
        </div>
    </section>

    <script>
        // YOUR UPDATED APPSCRIPT URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwA55pzownoKJym3pvdLib4GjzxnQDvEAkslptt9QK5B01P-3YdX-a9EwzV8U6n41Xe/exec'
        const form = document.getElementById('submit-to-google-sheet')
        const msg = document.getElementById("msg")
        const btn = document.getElementById("submitBtn")

        form.addEventListener('submit', e => {
            e.preventDefault()
            btn.disabled = true
            btn.innerHTML = "Sending..."
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    msg.innerHTML = "Success! Enquiry Sent."
                    msg.className = "text-center text-sm font-bold mt-4 text-green-500"
                    form.reset()
                    btn.disabled = false
                    btn.innerHTML = "Send Enquiry"
                })
                .catch(error => {
                    msg.innerHTML = "Error! Try again."
                    msg.className = "text-center text-sm font-bold mt-4 text-red-500"
                    btn.disabled = false
                    btn.innerHTML = "Send Enquiry"
                })
        })
    </script>
</body>
</html>
