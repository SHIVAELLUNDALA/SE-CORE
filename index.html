<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE Core | Audit & Deployment Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0056b3; /* Professional Blue */
            --dark: #1a1a1a;
            --light: #f8f9fa;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; color: var(--dark); line-height: 1.6; }
        
        /* Professional Hero Section */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1600'); 
            background-size: cover;
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        /* Fixing the Form Styling */
        .enquiry-container { max-width: 600px; margin: -50px auto 50px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #004494; }

        /* Grid for Services */
        .services { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px 10%; background: var(--light); }
        .card { background: white; padding: 20px; border-top: 5px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Precision Retail Audits & POSM Deployment</h1>
        <p>Serving leading brands across Pan India with excellence.</p>
    </section>

    <div class="enquiry-container">
        <h2>Request a Quote</h2>
        <form action="https://script.google.com/macros/s/AKfycbyWWHzp6yhCj5wkeaoPT_RU4rstqM_T9tK4Y8vP4WFkfGTzWQj-CJ6zzXlNaSbNTV8F/exec" method="POST">
            <input type="text" name="name" placeholder="Contact Person Name" required>
            <input type="text" name="company" placeholder="Agency / Company Name" required>
            <input type="email" name="email" placeholder="Business Email" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            
            <select name="service">
                <option value="" disabled selected>Select Service Required</option>
                <option value="External Audit">External Audit</option>
                <option value="POSM Deployment">POSM Deployment</option>
                <option value="Visual Merchandising">Visual Merchandising</option>
                <option value="Stock Audit">Stock Audit</option>
            </select>
            
            <textarea name="message" rows="4" placeholder="Brief about your project..."></textarea>
            <button type="submit">SUBMIT ENQUIRY</button>
        </form>
    </div>

    <section class="services">
        <div class="card">
            <h3>Audit Services</h3>
            <p>External and Stock audits with real-time reporting.</p>
        </div>
        <div class="card">
            <h3>Deployment</h3>
            <p>Professional POSM and Branding setups across South India.</p>
        </div>
    </section>

</body>
</html>
